# notify-playbooks.yml — Drop this into your library repo's .github/workflows/
#
# Fires a repository_dispatch event to TanStack/playbooks whenever docs or
# source files change on merge to main. This triggers the skill staleness
# check workflow in the playbooks repo.
#
# Requirements:
#   - A fine-grained PAT with contents:write on TanStack/playbooks stored
#     as the PLAYBOOK_NOTIFY_TOKEN repository secret.
#
# Template variables (replaced by `playbook setup`):
#   {{PACKAGE_NAME}}  — e.g. @tanstack/query
#   {{DOCS_PATH}}     — e.g. docs/**
#   {{SRC_PATH}}      — e.g. packages/query-core/src/**

name: Notify Playbooks

on:
  push:
    branches: [main]
    paths:
      - '{{DOCS_PATH}}'
      - '{{SRC_PATH}}'

jobs:
  notify:
    name: Notify TanStack Playbooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect changed files
        id: changes
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Dispatch to playbooks repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLAYBOOK_NOTIFY_TOKEN }}
          repository: TanStack/playbooks
          event-type: skill-check
          client-payload: |
            {
              "package": "{{PACKAGE_NAME}}",
              "sha": "${{ github.sha }}",
              "changed_files": ${{ steps.changes.outputs.files }}
            }
