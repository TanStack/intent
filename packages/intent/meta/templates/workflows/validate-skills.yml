# validate-skills.yml — Drop this into your library repo's .github/workflows/
#
# Validates skill files on PRs that touch any skills/ directory.
# Ensures frontmatter is correct, names match paths, and files stay under
# the 500-line limit.

name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - '**/skills/**'

jobs:
  validate:
    name: Validate skill files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install intent CLI
        run: npm install -g @tanstack/intent

      - name: Find and validate skills
        run: |
          found_file="$(mktemp)"

          find . \
            \( -path './.git' -o -path './node_modules' \) -prune -o \
            -type d -name skills -print |
          while IFS= read -r dir; do
            if ! find "$dir" -name SKILL.md -print -quit | grep -q .; then
              continue
            fi

            dir="${dir#./}"
            echo "Validating $dir..."
            intent validate "$dir"
            echo "1" > "$found_file"
          done

          if [ ! -s "$found_file" ]; then
            echo "No skills/ directory found — skipping validation."
          fi

          rm -f "$found_file"
