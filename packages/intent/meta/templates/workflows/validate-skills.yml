# validate-skills.yml — Drop this into your library repo's .github/workflows/
#
# Validates skill files on PRs that touch the skills/ directory.
# Ensures frontmatter is correct, names match paths, and files stay under
# the 500-line limit.

name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - '**/skills/**'

jobs:
  validate:
    name: Validate skill files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install intent CLI
        run: npm install -g @tanstack/intent

      - name: Find and validate skills
        run: |
          shopt -s globstar 2>/dev/null || true
          FOUND=false

          # Root-level skills directory
          if [ -d "skills" ]; then
            echo "Validating skills..."
            intent validate skills
            FOUND=true
          fi

          # Workspace package skills derived from workspace config
          for dir in {{WORKSPACE_SKILL_GLOBS}}; do
            if [ -d "$dir" ]; then
              echo "Validating $dir..."
              intent validate "$dir"
              FOUND=true
            fi
          done

          if [ "$FOUND" = "false" ]; then
            echo "No skills/ directory found — skipping validation."
          fi
