name: Benchmarks

on:
  push:
    branches:
      - 'main'
    paths:
      - 'packages/**'
      - 'benchmarks/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  pull_request:
    paths:
      - 'packages/**'
      - 'benchmarks/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_NO_CLOUD: true

jobs:
  benchmarks:
    name: Run intent CodSpeed benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Tools
        uses: tanstack/config/.github/setup@main

      - name: Run intent CodSpeed benchmark
        continue-on-error: true
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: WITH_INSTRUMENTATION=1 pnpm exec nx run @benchmarks/intent:test:perf
